<div class="home-container">
  <div class="header-section">
    <div class="my-avatar">
      <mat-icon>account_circle</mat-icon>
    </div>
    <div class="my-description">
      <span class="name">{{ myDetails.name }}</span>
      <span class="headline">{{ myDetails.headline }}</span>
      <span class="description">{{ myDetails.description }}</span>

      <div class="skills-section">
        <span>Skills:</span>
        <span class="skill" *ngFor="let item of myDetails.skillArr">{{ item }}</span>
      </div>
      <div class="skills-section">
        <span>Technologies:</span>
        <span class="skill" *ngFor="let item of myDetails.techArr">{{ item }}</span>
      </div>
    </div>
  </div>

  <div class="projects-section">
    <span class="header">Projects</span>
  </div>
</div>
