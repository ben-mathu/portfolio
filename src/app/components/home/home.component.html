<div class="container-fluid">
  <div class="jumbotron p-3 p-md-5 text-white rounded bg-dark">
    <div class="d-flex flex-wrap justify-content-between">
      <div class="my-avatar">
        <img src="{{ avatarImage }}"/>
      </div>
      <div class="my-description">
        <span class="name">{{ myDetails.name }}</span>
        <span class="headline">{{ myDetails.headline }}</span>
        <span class="description">{{ myDetails.description }}</span>

        <div class="skills-section d-flex flex-wrap">
          <span class="skills-title">Skills:</span>
          <span class="skill" *ngFor="let item of myDetails.skillArr">{{ item }}</span>
        </div>
        <div class="skills-section d-flex flex-wrap">
          <span class="skills-title">Technologies:</span>
          <span class="skill" *ngFor="let item of myDetails.techArr">{{ item }}</span>
        </div>
      </div>
    </div>
  </div> <!-- End of header-section -->

  <app-projects></app-projects>
</div> <!-- End of home-container -->
