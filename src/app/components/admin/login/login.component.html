<div class="container">
  <div class="form-wrapper">
    <form>
      <div class="mb-3">
        <mat-form-field class="input-text-field" appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput placeholder="Email" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" [formControl]="email">
        </mat-form-field>
        <!-- <label for="exampleInputEmail1" class="form-label">Email address</label>
        <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"> -->
      </div>
      <div class="mb-3">
        <mat-form-field class="input-text-field" appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" class="form-control" id="exampleInputPassword1">
        </mat-form-field>
        <!-- <label for="exampleInputPassword1" class="form-label">Password</label>
        <input type="password" class="form-control" id="exampleInputPassword1"> -->
      </div>
      <div class="mb-3">
        <mat-checkbox [formControl]="rememberMe">Remember Me</mat-checkbox>
        <!-- <input type="checkbox" class="form-check-input" id="exampleCheck1">
        <label class="form-check-label" for="exampleCheck1">Check me out</label> -->
      </div>
      <button mat-raised-button type="submit" class="btn btn-primary" color="primary">Login</button>
    </form>
  </div>
</div>
