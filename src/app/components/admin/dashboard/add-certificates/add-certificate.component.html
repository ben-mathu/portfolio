<form [formGroup]="addCertificateForm" class="mt-1 form-wrapper">
  <div class="row">
    <div class="col">
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>{{ certificateNameLabel }}</mat-label>
        <input
          matInput
          type="text"
          class="form-control"
          placeholder="{{ certificateNameLabel }}"
          formControlName="name"
          value="{{ selectedRow ? selectedRow.name : '' }}"
        />
      </mat-form-field>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <mat-form-field class="full-width" appearance="outline">
        <mat-label>{{ certificateUrlLabel }}</mat-label>
        <input
          matInput
          type="text"
          class="form-control"
          placeholder="{{ certificateUrlLabel }}"
          formControlName="url"
          value="{{ selectedRow ? selectedRow.url : '' }}"
        />
      </mat-form-field>
    </div>
  </div>
  <div class="d-flex">
    <button
      mat-raised-button
      class="btn btn-primary"
      color="primary"
      type="submit"
      (click)="add()"
    >
      Save
    </button>
    <button
      mat-raised-button
      *ngIf="selectedRow"
      class="btn btn-primary"
      color="warn"
      type="button"
      (click)="delete()"
    >
      Delete
    </button>
  </div>
</form>
