<mat-tab-group style="padding: 1px;">
  <mat-tab label="Edit">
    <mat-form-field class="full-width" appearance="outline">
      <mat-label>{{descriptionLabel}}</mat-label>
      <markdown-toolbar for="textarea">
        <md-bold>bold</md-bold>
        <md-header>header</md-header>
        <md-italic>italic</md-italic>
        <md-quote>quote</md-quote>
        <md-code>code</md-code>
        <md-link>link</md-link>
        <md-image>image</md-image>
        <md-unordered-list>unordered-list</md-unordered-list>
        <md-ordered-list>ordered-list</md-ordered-list>
        <md-task-list>task-list</md-task-list>
        <md-mention>mention</md-mention>
        <md-ref>ref</md-ref>
      </markdown-toolbar>
      <textarea matInput type="text" class="form-control" placeholder="{{descriptionLabel}}" id="textarea"  formControlName="description" value="{{ text }}"></textarea>
    </mat-form-field>
  </mat-tab>
  <mat-tab label="Preview">
    Content
  </mat-tab>
</mat-tab-group>
