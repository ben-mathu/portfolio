<div class="footer bg-{{ utils.getPreferredTheme() }}">
  <div class="follow-me">
    <div class="social-title sub-titles">Follow Me</div>
    <div class="social-links">
      <app-social-icons></app-social-icons>
    </div>
    <div class="social-universe">
      <!-- <div class="twitter-profile-timeline">
        <a class="twitter-timeline" data-width="470" data-height="400" data-theme="dark" href="https://twitter.com/beniemathu?ref_src=twsrc%5Etfw">Tweets by beniemathu</a>
      </div> -->
      <div class="spotify-playlist">
        <iframe
          style="border-radius: 12px"
          src="https://open.spotify.com/embed/playlist/6ISGW6cNRUjbn1AWTHfACy?utm_source=generator&theme=0"
          width="100%"
          height="352"
          frameBorder="0"
          allow="encrypted-media"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
        ></iframe>
      </div>
    </div>
    <!-- End of social-universe -->
  </div>
  <div class="links">
    <div class="link-sections">
      <div class="info-title sub-titles">Information</div>
      <div class="info-links">
        <mat-list
          class="contacts"
          *ngIf="myDetails !== null || myDetails !== undefined"
        >
          <a
            mat-list-item
            mat-stroked-button
            *ngIf="
              myDetails !== undefined && (platform.ANDROID || platform.IOS)
            "
            href="{{ myDetails ? myDetails.cv_url : '' }}"
            target="_blank"
          >
            <mat-icon>description</mat-icon>
            <span class="info-label">CV</span>
          </a>
          <button
            mat-list-item
            mat-stroked-button
            *ngIf="
              myDetails !== undefined && !(platform.ANDROID || platform.IOS)
            "
            (click)="openCvDialog('500ms', '250ms')"
          >
            <mat-icon>description</mat-icon>
            <span class="info-label">CV</span>
          </button>
          <a
            mat-list-item
            *ngIf="myDetails !== undefined"
            href="mailto:{{ myDetails ? myDetails.email : '' }}"
          >
            <button mat-stroked-button>
              <mat-icon>email</mat-icon>
              <span class="info-label">{{
                myDetails ? myDetails.email : ""
              }}</span>
            </button>
          </a>
        </mat-list>
      </div>
    </div>
