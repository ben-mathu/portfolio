<div class="skill-container">
  <mat-chip>
    <img
      matChipAvatar
      *ngIf="myInfo.icon"
      src="{{myInfo.icon}}"
      alt="Android"
    />
    {{ myInfo.tech }}
  </mat-chip>
  <span>{{ myInfo.rating }}</span>
</div>
<mat-progress-bar
  class="rounded"
  mode="determinate"
  value="{{ calculatePercentage(myInfo.rating) }}"
  color="accent"
></mat-progress-bar>
