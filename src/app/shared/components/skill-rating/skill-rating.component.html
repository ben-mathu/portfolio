<div class="skill-container">
  <mat-chip>
    <img
      matChipAvatar
      *ngIf="myInfo"
      src="{{myInfo.icon}}"
      alt="Android"
    />
    {{ myInfo ? myInfo.tech : '' }}
  </mat-chip>
  <span>{{ myInfo ? myInfo.rating : '' }}</span>
</div>
<mat-progress-bar
  class="rounded"
  mode="determinate"
  value="{{ myInfo ? calculatePercentage(myInfo.rating) : 0 }}"
  color="accent"
></mat-progress-bar>
