name: Deploy Github Pages

on:
  push:
    tags:
      - '*'
    branches:
      - develop

jobs:
  deploy-github-pages:
    runs-on: ubuntu-latest

    # permissions:
    #   pages: write
    #   id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Serialize icon names
        run: sh ./icons/serialize.sh

      - name: Setup for Deployments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MY_EMAIL: mathubenard@gmail.com
          MY_NAME: ${{ github.repository_owner }}

        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions"
          git remote set-url origin https://$MY_NAME:$GITHUB_TOKEN@github.com/$MY_NAME/$MY_NAME.git

      - uses: actions/setup-node@v3
        with:
          node-version: 18.13

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: true

      - name: Deploy
        run: pnpm run deploy
